<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  scroll-behavior: smooth;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('images/background.png') no-repeat center/cover;
  z-index: -1;
  filter: brightness(0.9);
}

/* SECTIONS (reduced spacing) */
.section {
  min-height: 30vh; /* reduced from 100vh */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  padding: 5px; /* reduce spacing */

  opacity: 0;
  transform: translateY(40px);
  transition: all 3s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* TEXT */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
  margin: 5px 0;
  color: rgb(56, 56, 8);
}

h2 {
  font-size: 20px;
  font-family:'Cormorant Garamond', cursive;
  margin: 10px 0;
  color: rgb(56, 56, 8);
}

p {
  font-size: 15px;
  margin: 2px 0;
  color: rgb(56, 56, 8);
  font-family:'Courier New', Courier, monospace
}

.invite-text {
  margin: 2px 0;
  line-height: 1.3;
  text-align: center;
  font-size: 18px;
  font-weight: bolder;
  font-family: 'Cormorant Garamond'; /* match invite line style */
}

/* GANESHA */
.ganesha {
  width: 100px;
  margin-bottom: 5px;
  border-radius: 50%;
  padding: 8px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px gold;
  max-width: 40vw;
  height: auto;
}


  .bg-image {
    position: fixed;
    bottom: 0vh; /* responsive bottom spacing */
    left: 50%;
    transform: translate(-50%, 40px);
    width: 70vw;
    max-width: 450px;
    opacity: 0;
    filter: blur(1px) brightness(1) sepia(0.25);
    transition: opacity 2s ease, transform 4s ease;
    z-index: 0;
    padding: 0 5vw; /* responsive side spacing */
    box-sizing: border-box;
  }

.bg-image.show {
  opacity: 0.35; /* visible but still background */
  transform: translate(-50%, 0); /* stays centered responsively */
}

.section {
  position: relative;
}

/* COUNTDOWN */
#countdown {
  font-size: 100px; /* increased size */
  color: rgb(56, 56, 8);
  font-family: 'Cormorant Garamond', cursive;
  font-weight: bold;
}
.wedding-date {
  font-size:50px;
  color: rgb(56, 56, 8);
  margin-top: 2px;
  margin-bottom: 2px;
  font-family: 'Cormorant Garamond', cursive;
}

/* MAP BUTTON */
.map-btn {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 25px;
  background: #ff4d4d;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.map-btn:hover {
  background: #8c8888;
}

.venue {
  font-size: 16px;
  margin-top: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  text-align: center;
  padding: 0 10px;
}

.map-text a {
  color: #13008b;
  text-decoration: underline;
  font-size: 14px;
  display: block;
  text-align: center;
  margin-top: 8px;
}
.h3 {
font-size: 3cm;
  color: rgb(58, 58, 37);
  font-style:normal;
}
.save-date {
  font-family: 'Cinzel', cursive;
  font-size: 40px;
  color:rgb(58, 58, 37) ;
  font-weight:lighter;
  margin-bottom: 0px; /* tighter spacing */
}
.date-text {
  margin-top: -60px;   /* move upwards */
  margin-left: 40px;  /* move slightly left */
  align-self: flex-start;
}

h1 {
  font-family: 'Great Vibes', cursive;
}

/* MONOGRAM */
.monogram {
  width: 4vw;
  max-width: 240px;
  min-width: 400px;
  margin-top: -100px; /* reduce gap (move closer to Save the Date) */
  height: auto;
  margin-bottom: -100px;
}

/* RESPONSIVE DESIGN */
@media (max-width: 768px) {
  h1 { font-size: 34px; }
  h2 { font-size: 18px; }
  p { font-size: 14px; }

  .wedding-date { font-size: 30px; }
  #countdown { font-size: 40px; } /* increased for mobile */

  .ganesha { width: 80px; }

  .corner-image { width: 240px; bottom: 1px; right: 1px; }

  .section {
    padding: 20px 10px;
    min-height: 40vh;
  }
  .monogram { width: 35vw; }
}

@media (min-width: 1200px) {
  h1 { font-size: 60px; }
  .wedding-date { font-size: 55px; }
  #countdown { font-size: 80px; } /* larger for big screens */
}

@media (max-width: 480px) {
  .corner-image {
    width: 110px;
    bottom: 5px;
    right: 5px;
  }
}</style>
</head>

<body>

<!-- SECTION 1 -->
<div class="section">
  <img src="images/ganesha.png" class="ganesha">
  <h2 class="save-date">Save the Date</h2>
  <img src="images/ monogram.png" class="monogram">
</div>

<!-- SECTION 2 -->
<div class="section" style="margin-top:-20px;">
  <h1>Vineeth S Nair</h1> <h1>&</h1> <h1>Meghna Badiger</h1>
  <p class="invite-text">INVITE YOU TO JOIN THEIR WEDDING</p><p class="invite-text">CELEBRATION ON</p>
  
  <h3 class="wedding-date">Sunday, April 26, 2026</h3>
  <h3 class="wedding-date">10:30 Am to 12:30 Pm</h3>
  <h2 id="countdown"></h2>
  <p class="invite-text">
    your presence and blessings will make this day<br>truly special for us
  </p>
</div>

<!-- SECTION 3 -->
<div class="section" style="margin-top:-150px;">
  
  <p class="venue">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#383808" viewBox="0 0 24 24" style="margin-right:6px; vertical-align:middle;">
    <path d="M12 22s8-6.58 8-12a8 8 0 1 0-16 0c0 5.42 8 12 8 12zm0-11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
  </svg>
    BPCL Marine Drive Auditorium, Ernakulam
  </p>

  <p class="map-text">
 <a href="https://www.google.com/maps/search/?api=1&query=BPCL+Marine+Drive+Auditorium+Behind+Highcourt+Ernakulam" target="_blank">
    View on Google Maps
    </a>
  </p>
</div>

<img src="images/bottom.png" class="bg-image">

<script>
/* SCROLL ANIMATION */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.9;

  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < trigger) {
      sec.classList.add('show');
    }

  });
});

const bgImage = document.querySelector('.bg-image');

window.addEventListener('scroll', () => {
  const triggerPoint = window.innerHeight * 0.85;
  const sectionTop = sections[1].getBoundingClientRect().top;

  if (sectionTop < triggerPoint) {
    bgImage.classList.add('show');
  }
});

/* COUNTDOWN */
const weddingDate = new Date("April 26, 2026").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = weddingDate - now;

  const days = Math.floor(d / (1000*60*60*24));


  document.getElementById("countdown").innerHTML =
    days + " Days to go" ;

}, 1000);
</script>


</body>
</html>
